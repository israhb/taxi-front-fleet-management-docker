<p-toast></p-toast>

<div class="flex justify-content-center">
    <p-dialog [(visible)]="visible">
        <ng-template pTemplate="headless">
            <div class="flex flex-column px-8 py-5 gap-4" style="border-radius: 12px; background-image: radial-gradient(circle at left top, var(--primary-400), var(--primary-700))">
                <div class="text-center mb-5">
                    <img src="https://c2.tmsglobal.com.mx/site/transformacion/img/header.jpg"
                     height="80" class="mb-3">

                </div>
                <div class="inline-flex flex-column gap-2">
                    <label for="username" class="text-primary-50 font-semibold">Usuario</label>
                    <input pInputText id="username" pAutoFocus [autofocus]="true" 
                        class="bg-white-alpha-20 border-none p-3 text-primary-50"
                        [(ngModel)]="user"
                    />
                </div>
                <div class="inline-flex flex-column gap-2">
                    <label for="password" class="text-primary-50 font-semibold">Contraseña</label>
                    <input pInputText id="password"
                        class="bg-white-alpha-20 border-none p-3 text-primary-50"
                        type="password" [(ngModel)]="password"
                    />
                </div>
                <div  *ngIf="!loading" class="flex align-items-center gap-2">
                    <p-button label="Entrar"  (click)="getLogin()"
                    [text]="true" styleClass="w-full text-primary-50 border-1 border-white-alpha-30 hover:bg-white-alpha-10" class="w-full" ></p-button>
                </div>
                <div class="flex align-items-center justify-content-center mb-5 gap-5"
                        *ngIf="loading"
                >
                    <p-progressSpinner styleClass="w-4rem h-4rem" strokeWidth="8" fill="var(--surface-ground)" animationDuration=".5s"></p-progressSpinner>
                </div>
            </div>
        </ng-template>
    </p-dialog>
    </div>
