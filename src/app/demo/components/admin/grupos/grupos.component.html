<p-toast></p-toast>
<app-spinner></app-spinner>
<div class="grid">
    <div class="col-12">
        <div class="card">
            <!-- data exported to excel -->
            <p-table
                #dt
                [value]="carteras"
                dataKey="numeracion"  selectionMode="multiple" [resizableColumns]="true"
                [tableStyle]="{ 'min-width': '20rem' }"
                styleClass="p-datatable-gridlines p-datatable-sm"
            >
                <ng-template pTemplate="caption">
                    <div>

                        <div class="flex flex-wrap">
                            <div class="flex flex-column mr-1">
                                <label>Region</label>
                                <p-dropdown
                                    [showClear]="true"
                                    [options]="form_filterG_option_region"
                                    optionLabel="d"
                                    [(ngModel)]="form_filterG_model_region"
                                    optionValue="i"
                                    placeholder="Selecciona Region"
                                    appendTo="body"
                                    (onChange)="selectedCombo(0)"

                                ></p-dropdown>
                            </div>
                            <div class="flex flex-column mr-1">
                                <label>Gerencia</label>
                                <p-dropdown
                                    [showClear]="true"
                                    [options]="form_filterG_option_gerencia"
                                    optionLabel="d"
                                    [(ngModel)]="form_filterG_model_gerencia"
                                    optionValue="i"
                                    placeholder="Selecciona Gerencia"
                                    appendTo="body"
                                    [disabled]="form_filterG_model_region ? false : true"
                                    (onChange)="selectedCombo(1)"

                                ></p-dropdown>
                            </div>
                            <div class="flex flex-column mr-1">
                                <label>Cedis</label>
                                <p-dropdown
                                    [showClear]="true"
                                    [options]="form_filterG_option_cedi"
                                    optionLabel="d"
                                    [(ngModel)]="form_filterG_model_cedi"
                                    optionValue="i"
                                    placeholder="Selecciona Cedi"
                                    appendTo="body"
                                    [disabled]="form_filterG_model_gerencia &&
                                    form_filterG_model_gerencia != -1 ? false : true"
                                    (onChange)="selectedCombo(2)"

                                ></p-dropdown>
                            </div>
                            <div class="flex flex-column mr-1">
                                <label>Rutas</label>
                                <p-multiSelect
                                    [options]="form_filterG_option_rutas"
                                    optionLabel="d"
                                    [(ngModel)]="form_filterG_model_rutas"
                                    optionValue="i"
                                    placeholder="Selecciona Cedi"
                                    appendTo="body"
                                    [disabled]="form_filterG_model_cedi &&
                                    form_filterG_model_cedi != -1 ? false : true"

                                ></p-multiSelect>
                            </div>
                            <div class="flex flex-column mr-1">
                                <label>Grupos</label>
                                <p-dropdown
                                    [showClear]="true"
                                    [options]="form_filterG_option_grupo"
                                    optionLabel="d"
                                    [(ngModel)]="form_filterG_model_grupo"
                                    optionValue="i"
                                    placeholder="Selecciona Grupo"
                                    appendTo="body"
                                    [disabled]="form_filterG_model_cedi &&
                                    form_filterG_model_cedi != -1 ? false : true"
                                ></p-dropdown>
                            </div>
                            <div class="flex flex-column md:flex-row md:justify-content-start md:align-items-center mr-1">
                                <p-button label="Filtrar" icon="pi pi-filter"
                                    (onClick)="runFilterGeneric()"
                                ></p-button>
                            </div>
                            <div
                                class="flex flex-column md:flex-row md:justify-content-start md:align-items-center">
                                <p-button icon="pi pi-upload" label="Cargar Grupos"
                                    severity="warning" (click)="openCargarGrupos()"
                                ></p-button>
                            </div>
                        </div>
                    </div>
                </ng-template>
                <ng-template pTemplate="header">
                    <tr class="text-sm">
                        <th>#</th>
                        <th>Id</th>
                        <th >Cedi</th>
                        <th >Ruta</th>
                        <th >Grupo</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-cartera >
                    <tr class="text-sm" >
                        <td>
                            {{cartera.numeracion}}
                        </td>
                        <td>
                            {{cartera.id}}
                        </td>
                        <td>
                            {{cartera.cedi}}
                        </td>
                        <td>
                            {{cartera.ruta}}
                        </td>
                        <td>
                            {{cartera.grupo}}
                        </td>
                    </tr>
                </ng-template>
            </p-table>
            <div class="flex justify-content-start">
                <div class="col-2">
                    <button pButton icon="pi pi-refresh"
                    styleClass="p-button-sm" class="p-button-help p-button-sm"
                        pTooltip="Refresh"  (click)="runFilterGeneric()"
                        ooltipPosition="bottom">
                    </button>
                </div>
                <p-paginator
                    (onPageChange)="onPageChange($event)"
                    [showCurrentPageReport]="true"
                    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
                    [first]="first" [rows]="rows"
                    [totalRecords]="totalRecords" [rows]="15"
                    [rowsPerPageOptions]="[15, 20, 30, 40, 50, 100]"
                ></p-paginator>
            </div>
        </div>
    </div>
</div>

<!--cargar diaria y semanal -->
<div class="col-12" *ngIf="modalCargarDiaria">
    <app-c-dialog-upload-file
        [modalUploadFile]="modalCargarDiaria"
        [model_data_title]="'Cargar Grupos'"
        [messageArray]="messages"
        (flagClouseModalEvent)="clouseModalUploadFile($event)"
        (flagSuccessFileEvent)="getSuccesModalUpload($event)"
        (fileReturnEvent)="getFileData($event)"
    >
    </app-c-dialog-upload-file>
</div>
